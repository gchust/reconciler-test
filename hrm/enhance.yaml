popups:
- target: $employees.table.actions.addNew
  auto:
  - edit
  coll: hrm_employees
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - emp_code
    - name
    - department
    - position
    - hire_date
    - status
    - gender
    - phone
    - email
    - emergency_contact
    - salary
    - bank_account
    actions:
    - submit
    field_layout:
    - '--- Personal Info ---'
    - - emp_code
      - name
      - gender
    - - phone
      - email
    - - emergency_contact
    - '--- Employment ---'
    - - department
      - position
      - status
    - - hire_date
    - '--- Compensation ---'
    - - salary
      - bank_account
- target: $employees.table.fields.name
  field: name
  mode: embed
  coll: hrm_employees
  tabs:
  - title: Overview
    blocks:
    - key: detail_main
      type: details
      coll: hrm_employees
      resource:
        binding: currentRecord
      fields:
      - emp_code
      - name
      - department
      - position
      - hire_date
      - status
      - gender
      - phone
      - email
      - emergency_contact
      js_items:
      - desc: Employee Detail KPI — tenure, salary, department, position, status badge
        file: ./js/detail_employee_kpi.js
      field_layout:
      - - '[JS:Employee Detail KPI — tenure, salary, department, position, status
          badge]'
      - '--- Personal Info ---'
      - - emp_code
        - name
        - gender
      - - phone
        - email
      - - emergency_contact
      - '--- Employment ---'
      - - department
        - position
        - status
      - - hire_date
      recordActions:
      - edit
    - key: detail_aux
      type: details
      coll: hrm_employees
      resource:
        binding: currentRecord
      fields:
      - salary
      - bank_account
      field_layout:
      - '--- Compensation ---'
      - - salary
      - - bank_account
    layout:
    - - detail_main: 16
      - detail_aux: 8
  - title: History
    blocks:
    - key: recordHistory_0
      type: recordHistory
      coll: hrm_employees
- target: $departments.table.actions.addNew
