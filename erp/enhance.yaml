popups:
- target: $物料管理.table.actions.addNew
  auto:
  - edit
  coll: nb_erp_products
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - product_code
    - name
    - category
    - spec
    - unit
    - standard_price
    - cost_price
    - stock_qty
    - min_stock
    - max_stock
    - lead_time
    - status
    - remark
    field_layout:
    - '--- 基本信息 ---'
    - - product_code
      - name
      - category
    - - spec
      - unit
      - status
    - '--- 价格 ---'
    - - standard_price
      - cost_price
    - '--- 库存 ---'
    - - stock_qty
      - min_stock
      - max_stock
    - - lead_time
    - '--- 备注 ---'
    - - remark
    actions:
    - submit
- target: $物料管理.table.fields.name
  mode: drawer
  coll: nb_erp_products
  blocks:
  - key: detail
    type: details
    resource:
      binding: currentRecord
    fields:
    - product_code
    - name
    - category
    - spec
    - unit
    - standard_price
    - cost_price
    - stock_qty
    - min_stock
    - max_stock
    - lead_time
    - status
    - remark
    js_items:
    - desc: 物料概览KPI卡片 — 标准价/成本/利润率/库存量/安全库存/采购周期, 库存状态红黄绿指示
      file: ./js/detail_product_kpi.js
    field_layout:
    - '--- 基本信息 ---'
    - - product_code
      - name
      - category
    - - spec
      - unit
      - status
    - '--- 价格 ---'
    - - standard_price
      - cost_price
    - '--- 库存 ---'
    - - stock_qty
      - min_stock
      - max_stock
    - - lead_time
    - '--- 备注 ---'
    - - remark
    recordActions:
    - edit
