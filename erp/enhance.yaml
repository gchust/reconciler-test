popups:
- target: $物料管理.table.actions.addNew
  auto:
  - edit
  coll: nb_erp_products
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - product_code
    - name
    - category
    - spec
    - unit
    - standard_price
    - cost_price
    - stock_qty
    - min_stock
    - max_stock
    - lead_time
    - status
    - remark
    field_layout:
    - '--- 基本信息 ---'
    - - product_code
      - name
      - category
    - - spec
      - unit
      - status
    - '--- 价格 ---'
    - - standard_price
      - cost_price
    - '--- 库存 ---'
    - - stock_qty
      - min_stock
      - max_stock
    - - lead_time
    - '--- 备注 ---'
    - - remark
    actions:
    - submit
- target: $物料管理.table.fields.name
  mode: embed
  coll: nb_erp_products
  tabs:
  - title: 详情
    blocks:
    - key: detail_main
      type: details
      resource:
        binding: currentRecord
      fields:
      - product_code
      - name
      - category
      - spec
      - unit
      - standard_price
      - cost_price
      - stock_qty
      - min_stock
      - max_stock
      - lead_time
      - status
      - remark
      js_items:
      - desc: 物料概览KPI卡片 — 标准价/成本/利润率/库存量/安全库存/采购周期, 库存状态红黄绿指示
        file: ./js/detail_product_kpi.js
      field_layout:
      - '--- 基本信息 ---'
      - - product_code
        - name
        - category
      - - spec
        - unit
        - status
      - '--- 价格 ---'
      - - standard_price
        - cost_price
      - '--- 库存 ---'
      - - stock_qty
        - min_stock
        - max_stock
      - - lead_time
      - '--- 备注 ---'
      - - remark
      recordActions:
      - edit
    - key: inv_list
      type: list
      title: 库存流水
      coll: nb_erp_inventory
      resource_binding:
        associationName: nb_erp_products.inventories
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_js:
      - desc: 库存流水行卡片 — 类型(入/出/调拨)标签+数量+仓库+关联单号+日期
        file: ./js/detail_product_inv_row.js
    - key: qc_list
      type: list
      title: 质检记录
      coll: nb_erp_quality
      resource_binding:
        associationName: nb_erp_products.qualities
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_js:
      - desc: 质检行卡片 — 检验类型+结果标签(绿/红/橙)+合格率+批次号
        file: ./js/detail_product_qc_row.js
    layout:
    - col:
      - detail_main
      size: 16
    - col:
      - inv_list
      - qc_list
      size: 8
  - title: 历史记录
    blocks:
    - key: history
      type: recordHistory
      resource:
        binding: currentRecord
- target: $客户管理.table.actions.addNew
  auto:
  - edit
  coll: nb_erp_customers
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - customer_code
    - name
    - contact
    - phone
    - email
    - address
    - level
    - industry
    - payment_terms
    - credit_limit
    - tax_rate
    - status
