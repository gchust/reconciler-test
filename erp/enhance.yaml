      binding: currentCollection
    fields:
    - code
    - name
    - category
    - spec
    - unit
    - list_price
    - cost_price
    - stock_qty
    - status
    actions:
    - submit
    field_layout:
    - '--- Basic Info ---'
    - - code
      - name
      - category
    - - spec
      - unit
      - status
    - '--- Pricing ---'
