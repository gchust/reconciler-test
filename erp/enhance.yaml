# ── Materials Detail Popup ──
- target: $materials.table.fields.name
  field: name
  mode: embed
  coll: erp_materials
  tabs:
  - title: Overview
    blocks:
    - key: detail_main
      type: details
      coll: erp_materials
      resource:
        binding: currentRecord
      fields:
      - code
      - name
      - category
      - spec
      - unit
      - status
      - stock_qty
      - min_stock
      - max_stock
      - lead_time
      js_items:
      - desc: Material KPI Metrics
        file: ./js/detail_material_kpi.js
      field_layout:
      - '[JS:Material KPI Metrics]'
      - '--- Basic Info ---'
      - - code
        - name
        - category
      - - spec
        - unit
        - status
      - '--- Inventory ---'
      - - stock_qty
        - min_stock
        - max_stock
      - - lead_time
      recordActions:
      - edit
    - key: detail_aux
      type: details
      coll: erp_materials
      resource:
        binding: currentRecord
      fields:
      - list_price
      - cost_price
      - remark
      field_layout:
      - '--- Pricing ---'
      - - list_price
        - cost_price
      - '--- Remark ---'
      - - remark
    layout:
    - - {col: [detail_main], size: 16}
      - {col: [detail_aux], size: 8}
  - title: History
    blocks:
    - key: recordHistory_0
      type: recordHistory
      coll: erp_materials

