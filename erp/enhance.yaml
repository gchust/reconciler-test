- target: $客户管理.table.fields.name
  mode: embed
  coll: nb_erp_customers
  tabs:
  - title: 详情
    blocks:
    - key: detail_main
      type: details
      resource:
        binding: currentRecord
      fields:
      - customer_code
      - name
      - contact
      - phone
      - email
      - address
      - level
      - industry
      - payment_terms
      - credit_limit
      - tax_rate
      - status
      js_items:
      - desc: 客户画像卡片 — 等级徽章(VIP金色/A蓝/B绿/C灰) + 信用额度 + 付款条件 + 行业标签 + 税率
        file: ./js/detail_customer_profile.js
      field_layout:
      - '--- 基本信息 ---'
      - - customer_code
        - name
        - level
      - - industry
        - status
      - '--- 联系方式 ---'
      - - contact
        - phone
        - email
      - - address
      - '--- 财务信息 ---'
      - - payment_terms
        - credit_limit
        - tax_rate
      recordActions:
      - edit
    - key: so_list
      type: list
      title: 销售订单
      coll: nb_erp_sales_orders
      resource_binding:
        associationName: nb_erp_customers.sales_orders
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_js:
      - desc: 销售订单行卡片 — 单号+金额+状态进度+交期倒计时
        file: ./js/detail_customer_so_row.js
    layout:
    - col:
      - detail_main
      size: 16
    - col:
      - so_list
      size: 8
  - title: 历史记录
    blocks:
    - key: history
      type: recordHistory
      resource:
        binding: currentRecord
