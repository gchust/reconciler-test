module: 制造业ERP
icon: tooloutlined
collections:
  nb_erp_products:
    title: 产品/物料
    fields:
    - name: product_code
      interface: input
      title: 物料编码
    - name: name
      interface: input
      title: 物料名称
    - name: category
      interface: select
      title: 分类
      options:
      - 原材料
      - 半成品
      - 成品
      - 辅料
      - 包装材料
    - name: unit
      interface: select
      title: 单位
      options:
      - 个
      - 件
      - 吨
      - 米
      - 套
      - 卷
      - 箱
    - name: spec
      interface: input
      title: 规格型号
    - name: standard_price
      interface: number
      title: 标准价格
    - name: cost_price
      interface: number
      title: 成本价
    - name: stock_qty
      interface: integer
      title: 库存数量
    - name: min_stock
      interface: integer
      title: 安全库存
    - name: max_stock
      interface: integer
      title: 最大库存
    - name: lead_time
      interface: integer
      title: 采购周期(天)
    - name: status
      interface: select
      title: 状态
      options:
      - 有效
      - 开发中
      - 停用
      - 待审核
    - name: remark
      interface: textarea
      title: 备注
  nb_erp_customers:
    title: 客户
    fields:
    - name: name
      interface: input
      title: 客户名称
    - name: customer_code
      interface: input
      title: 客户编号
    - name: contact
      interface: input
      title: 联系人
    - name: phone
      interface: input
      title: 电话
    - name: email
      interface: input
      title: 邮箱
    - name: address
      interface: textarea
      title: 地址
    - name: level
      interface: select
      title: 等级
      options:
      - VIP
      - A
      - B
      - C
    - name: industry
      interface: select
      title: 行业
      options:
      - 制造业
      - 能源
      - 汽车
      - 电子
      - 建筑
      - 其他
    - name: payment_terms
      interface: select
      title: 付款条件
      options:
      - 预付
      - 货到付款
      - 月结30天
      - 月结60天
      - 月结90天
    - name: credit_limit
      interface: number
      title: 信用额度
    - name: tax_rate
      interface: number
      title: 税率(%)
    - name: status
      interface: select
      title: 状态
      options:
      - 活跃
      - 暂停
      - 黑名单
  nb_erp_suppliers:
    title: 供应商
    fields:
    - name: name
      interface: input
      title: 供应商名称
    - name: supplier_code
      interface: input
      title: 供应商编号
    - name: contact
      interface: input
      title: 联系人
    - name: phone
      interface: input
      title: 电话
    - name: email
      interface: input
      title: 邮箱
    - name: address
      interface: textarea
      title: 地址
    - name: category
      interface: select
      title: 类别
      options:
      - 原材料
      - 零部件
      - 设备
      - 服务
      - 包装
    - name: rating
      interface: select
      title: 评级
      options:
      - A-优秀
      - B-良好
      - C-合格
      - D-待改善
    - name: payment_terms
      interface: select
      title: 付款条件
      options:
      - 预付
      - 月结30天
      - 月结60天
    - name: delivery_score
      interface: integer
      title: 交付评分
    - name: quality_score
      interface: integer
      title: 质量评分
    - name: status
      interface: select
      title: 状态
      options:
      - 合格
      - 试用
      - 暂停
      - 淘汰
  nb_erp_purchase_orders:
    title: 采购订单
    fields:
    - name: po_no
      interface: input
      title: 采购单号
    - name: supplier_name
      interface: input
      title: 供应商
    - name: total_amount
      interface: number
      title: 总金额
    - name: tax_amount
      interface: number
      title: 税额
    - name: status
      interface: select
      title: 状态
      options:
      - 草稿
      - 待审批
      - 已审批
      - 部分到货
      - 已到货
      - 已关闭
      - 已取消
    - name: priority
      interface: select
      title: 优先级
      options:
      - 紧急
      - 高
      - 普通
      - 低
    - name: order_date
      interface: datetime
      title: 下单日期
    - name: expected_date
      interface: datetime
      title: 预计到货
    - name: actual_date
      interface: datetime
      title: 实际到货
    - name: buyer
      interface: input
      title: 采购员
    - name: remark
      interface: textarea
      title: 备注
  nb_erp_sales_orders:
    title: 销售订单
    fields:
    - name: so_no
      interface: input
      title: 销售单号
    - name: customer_name
      interface: input
      title: 客户名称
    - name: total_amount
      interface: number
      title: 总金额
    - name: tax_amount
      interface: number
      title: 税额
    - name: status
      interface: select
      title: 状态
      options:
      - 草稿
      - 已确认
      - 生产中
      - 待发货
      - 部分发货
      - 已发货
      - 已签收
      - 已取消
    - name: priority
      interface: select
      title: 优先级
      options:
      - 紧急
      - 高
      - 普通
      - 低
    - name: order_date
      interface: datetime
      title: 下单日期
    - name: delivery_date
      interface: datetime
      title: 交货日期
    - name: shipped_date
      interface: datetime
      title: 发货日期
    - name: sales_rep
      interface: input
      title: 销售员
    - name: remark
      interface: textarea
      title: 备注
  nb_erp_work_orders:
    title: 生产工单
    fields:
    - name: wo_no
      interface: input
      title: 工单编号
    - name: product_name
      interface: input
      title: 产品名称
    - name: planned_qty
      interface: integer
      title: 计划数量
    - name: completed_qty
      interface: integer
      title: 完成数量
    - name: defect_qty
      interface: integer
      title: 不良数量
    - name: status
      interface: select
      title: 状态
      options:
      - 待排产
      - 生产中
      - 暂停
      - 已完工
      - 已关闭
    - name: priority
      interface: select
      title: 优先级
      options:
      - 紧急
      - 高
      - 普通
      - 低
    - name: planned_start
      interface: datetime
      title: 计划开始
    - name: planned_end
      interface: datetime
      title: 计划结束
    - name: actual_start
      interface: datetime
      title: 实际开始
    - name: actual_end
      interface: datetime
      title: 实际结束
    - name: workshop
      interface: input
      title: 车间
    - name: so_no
      interface: input
      title: 关联销售单
    - name: remark
      interface: textarea
      title: 备注
  nb_erp_inventory:
    title: 库存流水
    fields:
    - name: txn_no
      interface: input
      title: 流水号
    - name: product_name
      interface: input
      title: 物料名称
    - name: product_code
      interface: input
      title: 物料编码
    - name: txn_type
      interface: select
      title: 类型
      options:
      - 采购入库
      - 生产入库
      - 销售出库
      - 生产领料
      - 退货入库
      - 盘盈
      - 盘亏
      - 调拨
    - name: qty
      interface: integer
      title: 数量
    - name: warehouse
      interface: select
      title: 仓库
      options:
      - 原材料仓
      - 半成品仓
      - 成品仓
      - 退货仓
    - name: ref_no
      interface: input
      title: 关联单号
    - name: operator
      interface: input
      title: 操作人
    - name: remark
      interface: textarea
      title: 备注
  nb_erp_quality:
    title: 质检记录
    fields:
    - name: qc_no
      interface: input
      title: 质检单号
    - name: product_name
      interface: input
      title: 物料名称
    - name: qc_type
      interface: select
      title: 检验类型
      options:
      - 来料检验
      - 过程检验
      - 成品检验
      - 出货检验
    - name: batch_no
      interface: input
      title: 批次号
    - name: sample_qty
      interface: integer
      title: 抽检数量
    - name: pass_qty
      interface: integer
      title: 合格数量
    - name: fail_qty
      interface: integer
      title: 不合格数量
    - name: result
      interface: select
      title: 检验结果
      options:
      - 合格
      - 不合格
      - 让步接收
      - 待判定
    - name: ref_no
      interface: input
      title: 关联单号
    - name: inspector
      interface: input
      title: 检验员
    - name: remark
      interface: textarea
      title: 不合格描述
pages:
- page: 物料管理
  icon: appstoreoutlined
  coll: nb_erp_products
  blocks:
  - key: filter
    type: filterForm
    fields:
    - field: name
      label: 搜索
      filterPaths:
      - product_code
      - name
      - spec
    - field: category
      label: 分类
    - field: status
      label: 状态
    js_items:
    - file: ./js/物料管理_filter_js_0.js
    field_layout:
    - - smijoe4j
    - - name
      - category
      - status
  - key: table
    type: table
    fields:
    - product_code
    - name
    - category
    - spec
    - unit
    - standard_price
    - cost_price
    - stock_qty
    - status
    js_columns:
    - title: 库存状态
      file: ./js/物料管理_table_col_库存状态.js
    - title: 利润率
      file: ./js/物料管理_table_col_利润率.js
    actions:
    - filter
    - refresh
    - addNew
    - export
    recordActions:
    - edit
    - delete
  layout:
  - - filter
  - - table
