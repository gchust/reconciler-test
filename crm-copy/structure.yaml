# ═══════════════════════════════════
#  CRM 复刻：Leads 页面
# ═══════════════════════════════════
# 从 exports/crm/ 导出 → 复刻到新模块
# 使用原有 collection (nb_crm_leads)

module: CRM复刻
icon: rocketoutlined

pages:
  - page: Leads复刻
    icon: useraddoutlined
    coll: nb_crm_leads
    blocks:
      - key: filter
        type: filterForm
        fields:
          - field: name
            label: 搜索
            filterPaths: [name, company, email, phone]

      - key: table
        type: table
        fields: [name, source, status, industry, owner]
        actions: [filter, refresh, export, addNew]
        recordActions: [edit, view, delete]

    layout:
      - [filter]
      - [table]

  - page: 仪表盘
    icon: areachartoutlined
    blocks:
      - key: chart_pipeline
        type: chart
      - key: chart_funnel
        type: chart
      - key: chart_orders
        type: chart
      - key: chart_customers
        type: chart
      - key: chart_industry
        type: chart
      - key: js_stats1
        type: jsBlock
      - key: js_stats2
        type: jsBlock
      - key: js_stats3
        type: jsBlock
      - key: js_stats4
        type: jsBlock

    layout:
      - [chart_pipeline, chart_funnel]
      - [chart_orders, chart_customers]
      - [chart_industry]
      - [js_stats1, js_stats2, js_stats3, js_stats4]
