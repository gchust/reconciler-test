# ═══════════════════════════════════
#  Layer 1: 库存管理 — 页面骨架
# ═══════════════════════════════════

module: 库存管理v2
icon: shoppingoutlined

collections:
  inv2_products:
    title: 产品
    fields:
      - { name: sku, interface: input, title: SKU }
      - { name: product_name, interface: input, title: 产品名称 }
      - { name: category, interface: select, title: 分类, options: [原材料, 半成品, 成品] }
      - { name: unit, interface: input, title: 单位 }
      - { name: price, interface: number, title: 单价 }
      - { name: stock_qty, interface: integer, title: 库存数量 }
      - { name: min_qty, interface: integer, title: 最低库存 }
      - { name: status, interface: select, title: 状态, options: [正常, 缺货, 停用] }

  inv2_records:
    title: 出入库记录
    fields:
      - { name: record_no, interface: input, title: 单号 }
      - { name: record_type, interface: select, title: 类型, options: [入库, 出库, 盘点] }
      - { name: quantity, interface: integer, title: 数量 }
      - { name: operator, interface: input, title: 经办人 }

pages:
  - page: 产品管理
    icon: appstoreoutlined
    coll: inv2_products
    blocks:
      - key: filter
        type: filterForm
        fields: [product_name, category, status]

      - key: table
        type: table
        fields: [sku, product_name, category, unit, price, stock_qty, min_qty, status]
        actions: [filter, refresh, addNew, export]
        recordActions: [edit, view, delete]

  - page: 出入库
    icon: swapoutlined
    coll: inv2_records
    blocks:
      - key: filter
        type: filterForm
        fields: [record_no, record_type]

      - key: table
        type: table
        fields: [record_no, record_type, quantity, operator]
        actions: [filter, refresh, addNew]
        recordActions: [edit, view]
