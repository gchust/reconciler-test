# CRM v2 复刻 — 从 exports/crm-v2 导出
module: CRMv2
icon: teamoutlined

pages:
  - page: Customers
    icon: teamoutlined
    coll: nb_crm_customers
    blocks:
      - key: filter
        type: filterForm
        fields:
          - field: name
            label: 搜索
            filterPaths: [name, phone, website]
        js_items:
          - desc: Customer Stats Filter Block
            file: ./js/customers_filterForm_e31595_js_customer_stats_filter_block.js
        field_layout:
          - ["[JS:Customer Stats Filter Block]"]
          - [name]

      - key: table
        type: table
        fields: [name, type, region, level, status, owner]
        actions: [filter, refresh, addNew]
        recordActions: [edit, delete]

    layout:
      - [filter]
      - [table]
