popups:
  - target: $projects.table.actions.addNew
    auto:
      - edit
      - detail
    view_field: name
    coll: nb_pm_projects
    blocks:
      - key: form
        type: createForm
        coll: nb_pm_projects
        fields:
          - code
          - name
          - owner
          - client_name
          - start_date
          - end_date
          - budget
          - progress
          - priority
          - status
          - description
        actions:
          - submit
        field_layout:
          - '--- 项目基础信息 ---'
          - - code
            - name
          - - owner
            - client_name
          - - start_date
            - end_date
          - '--- 执行信息 ---'
          - - budget
            - progress
          - - priority
            - status
          - '--- 项目说明 ---'
          - - description
  - target: $tasks.table.actions.addNew
    auto:
      - edit
      - detail
    view_field: title
    coll: nb_pm_tasks
    blocks:
      - key: form
        type: createForm
        coll: nb_pm_tasks
        fields:
          - task_no
          - title
          - project
          - assignee
          - start_date
          - due_date
          - planned_hours
          - actual_hours
          - priority
          - status
          - description
        actions:
          - submit
        field_layout:
          - '--- 任务信息 ---'
          - - task_no
            - title
          - - project
            - assignee
          - - start_date
            - due_date
          - '--- 进度与工时 ---'
          - - planned_hours
            - actual_hours
          - - priority
            - status
          - '--- 描述 ---'
          - - description
  - target: $milestones.table.actions.addNew
    auto:
      - edit
      - detail
    view_field: name
    coll: nb_pm_milestones
    blocks:
      - key: form
        type: createForm
        coll: nb_pm_milestones
        fields:
          - name
          - project
          - owner
          - planned_date
          - completed_date
          - status
          - description
        actions:
          - submit
        field_layout:
          - '--- 里程碑信息 ---'
          - - name
            - project
          - - owner
            - status
          - - planned_date
            - completed_date
          - '--- 说明 ---'
          - - description
  - target: $members.table.actions.addNew
    auto:
      - edit
      - detail
    view_field: name
    coll: nb_pm_members
    blocks:
      - key: form
        type: createForm
        coll: nb_pm_members
        fields:
          - employee_no
          - name
          - role_name
          - department
          - email
          - phone
          - status
          - joined_at
          - notes
        actions:
          - submit
        field_layout:
          - '--- 成员资料 ---'
          - - employee_no
            - name
          - - role_name
            - department
          - - email
            - phone
          - - status
            - joined_at
          - '--- 备注 ---'
          - - notes
  - target: $time_entries.table.actions.addNew
    auto:
      - edit
      - detail
    view_field: entry_no
    coll: nb_pm_time_entries
    blocks:
      - key: form
        type: createForm
        coll: nb_pm_time_entries
        fields:
          - entry_no
          - project
          - task
          - member_name
          - work_date
          - hours
          - billable
          - status
          - summary
        actions:
          - submit
        field_layout:
          - '--- 工时信息 ---'
          - - entry_no
            - member_name
          - - project
            - task
          - - work_date
            - hours
          - - billable
            - status
          - '--- 工作内容 ---'
          - - summary
