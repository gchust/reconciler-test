coll: nb_pm_projects
blocks:
  - key: filter
    type: filterForm
    coll: nb_pm_projects
    fields:
      - field: name
        label: 搜索
        filterPaths:
          - name
          - code
          - client_name
          - owner
      - status
      - priority
      - owner
    actions:
      - submit
      - reset
    field_layout:
      - - name
      - - status
        - priority
        - owner
  - key: table
    type: table
    coll: nb_pm_projects
    fields:
      - field: name
        clickToOpen: true
      - code
      - owner
      - client_name
      - end_date
      - progress
      - priority
      - status
    actions:
      - filter
      - refresh
      - addNew
      - export
    recordActions:
      - edit
      - view
      - delete
layout:
  - - filter
  - - table
