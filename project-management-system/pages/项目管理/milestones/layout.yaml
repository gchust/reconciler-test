coll: nb_pm_milestones
blocks:
  - key: filter
    type: filterForm
    coll: nb_pm_milestones
    fields:
      - field: name
        label: 搜索
        filterPaths:
          - name
          - owner
      - status
      - project
      - owner
    actions:
      - submit
      - reset
    field_layout:
      - - name
      - - status
        - project
        - owner
  - key: table
    type: table
    coll: nb_pm_milestones
    fields:
      - field: name
        clickToOpen: true
      - project
      - owner
      - planned_date
      - completed_date
      - status
    actions:
      - filter
      - refresh
      - addNew
      - export
    recordActions:
      - edit
      - view
      - delete
layout:
  - - filter
  - - table
