coll: nb_pm_time_entries
blocks:
  - key: filter
    type: filterForm
    coll: nb_pm_time_entries
    fields:
      - field: entry_no
        label: 搜索
        filterPaths:
          - entry_no
          - member_name
      - status
      - project
      - billable
    actions:
      - submit
      - reset
    field_layout:
      - - entry_no
      - - status
        - project
        - billable
  - key: table
    type: table
    coll: nb_pm_time_entries
    fields:
      - field: entry_no
        clickToOpen: true
      - project
      - task
      - member_name
      - work_date
      - hours
      - billable
      - status
    actions:
      - filter
      - refresh
      - addNew
      - export
    recordActions:
      - edit
      - view
      - delete
layout:
  - - filter
  - - table
