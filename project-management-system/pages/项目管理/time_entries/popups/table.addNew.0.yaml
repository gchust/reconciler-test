target: $time_entries.table.actions.addNew
view_field: entry_no
coll: nb_pm_time_entries
blocks:
  - key: form
    type: createForm
    coll: nb_pm_time_entries
    fields:
      - entry_no
      - project
      - task
      - member_name
      - work_date
      - hours
      - billable
      - status
      - summary
    actions:
      - submit
    field_layout:
      - '--- 工时信息 ---'
      - - entry_no
        - member_name
      - - project
        - task
      - - work_date
        - hours
      - - billable
        - status
      - '--- 工作内容 ---'
      - - summary
