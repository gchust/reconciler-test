coll: nb_pm_members
blocks:
  - key: filter
    type: filterForm
    coll: nb_pm_members
    fields:
      - field: name
        label: 搜索
        filterPaths:
          - name
          - employee_no
          - email
          - phone
      - status
      - department
      - role_name
    actions:
      - submit
      - reset
    field_layout:
      - - name
      - - status
        - department
        - role_name
  - key: table
    type: table
    coll: nb_pm_members
    fields:
      - field: name
        clickToOpen: true
      - employee_no
      - role_name
      - department
      - email
      - phone
      - status
    actions:
      - filter
      - refresh
      - addNew
      - export
    recordActions:
      - edit
      - view
      - delete
layout:
  - - filter
  - - table
