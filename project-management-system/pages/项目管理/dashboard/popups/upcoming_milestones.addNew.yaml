target: $dashboard.upcoming_milestones.actions.addNew
auto:
  - edit
  - detail
view_field: name
coll: nb_pm_milestones
blocks:
  - key: form
    type: createForm
    coll: nb_pm_milestones
    fields:
      - name
      - project
      - owner
      - planned_date
      - completed_date
      - status
      - description
    actions:
      - submit
    field_layout:
      - '--- 里程碑信息 ---'
      - - name
        - project
      - - owner
        - status
      - - planned_date
        - completed_date
      - '--- 说明 ---'
      - - description
