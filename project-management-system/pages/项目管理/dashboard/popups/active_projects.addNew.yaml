target: $dashboard.active_projects.actions.addNew
view_field: name
coll: nb_pm_projects
blocks:
  - key: form
    type: createForm
    coll: nb_pm_projects
    fields:
      - code
      - name
      - owner
      - client_name
      - start_date
      - end_date
      - budget
      - progress
      - priority
      - status
      - description
    actions:
      - submit
    field_layout:
      - '--- 项目基础信息 ---'
      - - code
        - name
      - - owner
        - client_name
      - - start_date
        - end_date
      - '--- 执行信息 ---'
      - - budget
        - progress
      - - priority
        - status
      - '--- 项目说明 ---'
      - - description
