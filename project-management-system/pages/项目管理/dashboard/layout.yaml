blocks:
  - key: project_overview_kpi
    type: jsBlock
    file: ./js/project_overview_kpi.js
    desc: Project Overview KPI
  - key: chart_projects_status
    type: chart
    chart_config: ./charts/projects_status.yaml
  - key: chart_tasks_status
    type: chart
    chart_config: ./charts/tasks_status.yaml
  - key: chart_milestones_status
    type: chart
    chart_config: ./charts/milestones_status.yaml
  - key: chart_member_status
    type: chart
    chart_config: ./charts/member_status.yaml
  - key: chart_time_entries_billable
    type: chart
    chart_config: ./charts/time_entries_billable.yaml
  - key: active_projects
    type: table
    coll: nb_pm_projects
    title: 进行中的项目
    fields:
      - field: name
        clickToOpen: true
      - owner
      - client_name
      - end_date
      - progress
      - status
    actions:
      - refresh
    dataScope:
      status: active
    pageSize: 8
  - key: my_tasks
    type: table
    coll: nb_pm_tasks
    title: 待跟进任务
    fields:
      - field: title
        clickToOpen: true
      - project
      - assignee
      - due_date
      - priority
      - status
    actions:
      - refresh
    dataScope:
      status:
        $in:
          - todo
          - in_progress
          - blocked
    pageSize: 8
  - key: upcoming_milestones
    type: table
    coll: nb_pm_milestones
    title: 近期里程碑
    fields:
      - field: name
        clickToOpen: true
      - project
      - owner
      - planned_date
      - status
    actions:
      - refresh
    dataScope:
      status:
        $in:
          - pending
          - in_progress
          - delayed
    pageSize: 8
layout:
  - - project_overview_kpi
  - - chart_projects_status: 8
    - chart_tasks_status: 8
    - chart_milestones_status: 8
  - - chart_member_status: 12
    - chart_time_entries_billable: 12
  - - active_projects
  - - my_tasks: 14
    - upcoming_milestones: 10
