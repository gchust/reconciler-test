field: name
field_uid: fc8f91d937e
mode: embed
tabs:
- blocks:
  - key: details_0
    type: details
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - customer
    - contact
    - owner
    - createdAt
    js_items:
    - desc: Opportunity Key Stats Block
      file: ./js/opp_popup_name_tab0_details_0_opportunity_key_stats_block.js
    field_layout:
    - - '---'
    - - customer
      - contact
      - owner
      - createdAt
    actions:
    - edit
  - key: ai_smart_analysis
    type: details
    title: AI Smart Analysis
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: AI Risk Analysis
      file: ./js/opp_popup_name_tab0_ai_smart_analysis_ai_risk_analysis.js
    field_layout:
    - - '[JS:AI Risk Analysis]'
  - key: quotations
    type: table
    title: Quotations
    coll: nb_crm_quotations
    resource_binding:
      associationName: nb_crm_opportunities.quotations
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - quotation_no
    - currencyInfo
    - discount_rate
    - status
    - total_amount_usd
    - total_amount
    - version
    - createdAt
    actions:
    - filter
    - refresh
    - addNew
  - key: comments_3
    type: comments
    coll: nb_crm_comments
    resource_binding:
      associationName: nb_crm_opportunities.comments
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
  - key: attachments
    type: details
    title: Attachments
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - attachments
    actions:
    - edit
  - key: details_5
    type: details
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: Opportunity Stage Flow Block
      file: ./js/opp_popup_name_tab0_details_5_opportunity_stage_flow_block.js
  - key: details_6
    type: details
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: Quote Status Flow Block
      file: ./js/opp_popup_name_tab0_details_6_quote_status_flow_block.js
  layout:
  - - col:
      - details_0
      - details_5
      - ai_smart_analysis
      - quotations
      - details_6
