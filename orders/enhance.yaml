# ═══════════════════════════════════
#  Layer 2: 订单管理 — 弹窗内容
# ═══════════════════════════════════

popups:
  # ── 订单：新建 ──
  - target: $订单列表.table.actions.addNew
    blocks:
      - key: form
        type: createForm
        resource: { binding: currentCollection }
        fields: [order_no, customer_name, total_amount, status, order_date, delivery_date, remark]
        field_layout:
          - [{order_no: 8}, {customer_name: 8}, {status: 8}]       # 基本信息一行
          - [{total_amount: 8}, {order_date: 8}, {delivery_date: 8}] # 金额+日期一行
          - [remark]                                                  # 备注独占
        actions: [submit]

  # ── 订单：编辑 ──
  - target: $订单列表.table.record_actions.edit
    blocks:
      - key: form
        type: editForm
        resource: { binding: currentRecord }
        fields: [order_no, customer_name, total_amount, status, order_date, delivery_date, remark]
        field_layout:
          - [{order_no: 8}, {customer_name: 8}, {status: 8}]
          - [{total_amount: 8}, {order_date: 8}, {delivery_date: 8}]
          - [remark]
        actions: [submit]

  # ── 订单：查看 ──
  - target: $订单列表.table.record_actions.view
    blocks:
      - key: detail
        type: details
        resource: { binding: currentRecord }
        fields: [order_no, customer_name, status, total_amount, order_date, delivery_date, remark]
        field_layout:
          - [{order_no: 8}, {customer_name: 8}, {status: 8}]
          - [{total_amount: 8}, {order_date: 8}, {delivery_date: 8}]
          - [remark]
        recordActions: [edit]

  # ── 客户：新建 ──
  - target: $客户.table.actions.addNew
    blocks:
      - key: form
        type: createForm
        resource: { binding: currentCollection }
        fields: [name, level, contact, phone]
        field_layout:
          - [name, level]
          - [contact, phone]
        actions: [submit]

  # ── 客户：编辑 ──
  - target: $客户.table.record_actions.edit
    blocks:
      - key: form
        type: editForm
        resource: { binding: currentRecord }
        fields: [name, level, contact, phone]
        field_layout:
          - [name, level]
          - [contact, phone]
        actions: [submit]

  # ── 客户：查看 ──
  - target: $客户.table.record_actions.view
    blocks:
      - key: detail
        type: details
        resource: { binding: currentRecord }
        fields: [name, level, contact, phone]
        field_layout:
          - [name, level]
          - [contact, phone]
        recordActions: [edit]

  # ── 产品：新建 ──
  - target: $产品.table.actions.addNew
    blocks:
      - key: form
        type: createForm
        resource: { binding: currentCollection }
        fields: [sku, name, price, unit, stock]
        field_layout:
          - [{sku: 8}, {name: 16}]            # SKU 短，名称长
          - [{price: 8}, {unit: 8}, {stock: 8}]
        actions: [submit]

  # ── 产品：编辑 ──
  - target: $产品.table.record_actions.edit
    blocks:
      - key: form
        type: editForm
        resource: { binding: currentRecord }
        fields: [sku, name, price, unit, stock]
        field_layout:
          - [{sku: 8}, {name: 16}]
          - [{price: 8}, {unit: 8}, {stock: 8}]
        actions: [submit]
